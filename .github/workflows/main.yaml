name: Deploy VivaCash Frontend - Main

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  build:
    name: Build and Deploy to Main
    runs-on: ubuntu-latest
    env:
      AWS_S3_BUCKET: vivacash-frontend
      VERSION_PATH: main-v${{ github.run_number }}
      FUNCTION_NAME: VivaCashRouter
      DIST_ID: E1PQ2RJZYTOCQ9
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Build application (production)
        run: pnpm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ env.AWS_S3_BUCKET }}/evento/main/${{ env.VERSION_PATH }}/ --delete
          aws s3 sync dist/ s3://${{ env.AWS_S3_BUCKET }}/evento/main/main-latest/ --delete

      - name: Update CloudFront Function
        run: |
          cp infra/cloudfront-router.js current_code.js

          # Substituir domínios
          sed -i "s|/\*{{DEVELOP_DOMAINS}}\*/|'dev.meuvivacash.com'|g" current_code.js
          sed -i "s|/\*{{MAIN_DOMAINS}}\*/|'www.meuvivacash.com', 'meuvivacash.com'|g" current_code.js

          # Substituir prefixos de versão (incluindo subdiretórios S3)
          sed -i "s|DEFAULT_PLACEHOLDER|/evento/main/main-latest|g" current_code.js
          sed -i "s|DEVELOP_PLACEHOLDER|/evento/develop/develop-latest|g" current_code.js
          sed -i "s|MAIN_PLACEHOLDER|/evento/main/main-latest|g" current_code.js

          # Criar função se não existir
          if ! aws cloudfront describe-function --name ${{ env.FUNCTION_NAME }} --stage DEVELOPMENT &>/dev/null; then
            echo "⚠️ Função não existe, criando..."
            aws cloudfront create-function \
              --name ${{ env.FUNCTION_NAME }} \
              --function-config '{"Comment":"VivaCash Main ${{ github.run_number }}","Runtime":"cloudfront-js-2.0"}' \
              --function-code fileb://current_code.js
            echo "✅ Função criada com sucesso"
          fi

          # Atualizar função
          ETAG=$(aws cloudfront describe-function --name ${{ env.FUNCTION_NAME }} --stage DEVELOPMENT --query 'ETag' --output text)
          aws cloudfront update-function --name ${{ env.FUNCTION_NAME }} --function-config '{"Comment":"VivaCash Main ${{ github.run_number }}","Runtime":"cloudfront-js-2.0"}' --function-code fileb://current_code.js --if-match $ETAG

          # Publicar função
          NEW_ETAG=$(aws cloudfront describe-function --name ${{ env.FUNCTION_NAME }} --stage DEVELOPMENT --query 'ETag' --output text)
          aws cloudfront publish-function --name ${{ env.FUNCTION_NAME }} --if-match $NEW_ETAG
          echo "✅ Função atualizada e publicada"

      - name: Associate Function to CloudFront Distribution
        run: |
          # Obter ARN da função
          FUNCTION_ARN=$(aws cloudfront describe-function --name ${{ env.FUNCTION_NAME }} --stage LIVE --query 'FunctionSummary.FunctionMetadata.FunctionARN' --output text)
          echo "Function ARN: $FUNCTION_ARN"

          # Verificar se já está associada
          CURRENT_ASSOCIATION=$(aws cloudfront get-distribution-config --id ${{ env.DIST_ID }} --query 'DistributionConfig.DefaultCacheBehavior.FunctionAssociations.Items[?FunctionARN==`'"$FUNCTION_ARN"'`].FunctionARN' --output text)

          if [ -z "$CURRENT_ASSOCIATION" ]; then
            echo "⚠️ Função não está associada, associando..."
            
            # Obter configuração atual
            aws cloudfront get-distribution-config --id ${{ env.DIST_ID }} > /tmp/cf-config.json
            ETAG=$(jq -r '.ETag' /tmp/cf-config.json)
            
            # Atualizar associação
            jq --arg arn "$FUNCTION_ARN" '.DistributionConfig.DefaultCacheBehavior.FunctionAssociations = {
              "Quantity": 1,
              "Items": [
                {
                  "FunctionARN": $arn,
                  "EventType": "viewer-request"
                }
              ]
            }' /tmp/cf-config.json | jq '.DistributionConfig' > /tmp/cf-config-updated.json
            
            # Atualizar distribuição
            aws cloudfront update-distribution \
              --id ${{ env.DIST_ID }} \
              --distribution-config file:///tmp/cf-config-updated.json \
              --if-match "$ETAG"
            
            echo "✅ Função associada à distribuição"
          else
            echo "✅ Função já está associada"
          fi

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ env.DIST_ID }} --paths "/*"

      - name: CloudFront Invalidation
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ env.DIST_ID }} --paths "/*"
