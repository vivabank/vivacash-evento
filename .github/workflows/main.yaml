name: Deploy VivaCash Evento - Main

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  build:
    name: Build and Deploy to Main
    runs-on: ubuntu-latest
    env:
      AWS_S3_BUCKET: vivacash-frontend
      VERSION_PATH: main-v${{ github.run_number }}
      FUNCTION_NAME: VivaCashUnifiedRouter
      DIST_ID: E1PQ2RJZYTOCQ9
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Build application (production)
        run: pnpm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ env.AWS_S3_BUCKET }}/evento/main/${{ env.VERSION_PATH }}/ --delete
          aws s3 sync dist/ s3://${{ env.AWS_S3_BUCKET }}/evento/main/main-latest/ --delete

      - name: Update and Publish CloudFront Function
        run: |
          # Criar função se não existir
          if ! aws cloudfront describe-function --name ${{ env.FUNCTION_NAME }} --stage DEVELOPMENT &>/dev/null; then
            echo "⚠️ Função não existe, criando..."
            aws cloudfront create-function \
              --name ${{ env.FUNCTION_NAME }} \
              --function-config '{"Comment":"VivaCash Unified Router","Runtime":"cloudfront-js-2.0"}' \
              --function-code fileb://infra/cloudfront-router.js
            echo "✅ Função criada com sucesso"
          fi

          # Atualizar função com o código unificado do repositório
          ETAG=$(aws cloudfront describe-function --name ${{ env.FUNCTION_NAME }} --stage DEVELOPMENT --query 'ETag' --output text)
          aws cloudfront update-function --name ${{ env.FUNCTION_NAME }} --function-config '{"Comment":"VivaCash Unified Router","Runtime":"cloudfront-js-2.0"}' --function-code fileb://infra/cloudfront-router.js --if-match $ETAG

          # Publicar função em produção (LIVE)
          NEW_ETAG=$(aws cloudfront describe-function --name ${{ env.FUNCTION_NAME }} --stage DEVELOPMENT --query 'ETag' --output text)
          aws cloudfront publish-function --name ${{ env.FUNCTION_NAME }} --if-match $NEW_ETAG
          echo "✅ Função atualizada e publicada em LIVE"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ env.DIST_ID }} --paths "/*"
